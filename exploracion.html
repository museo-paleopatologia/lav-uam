<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Exploración interactiva de paleopatología — esqueleto anatómico y grid de patologías con filtros combinados." />
  <title>Exploración · OsteoVirtual</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700;900&family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
  <link rel="stylesheet" href="style.css" />

  <style>
    /* ════════════════════════════════════════
       VARIABLES — PALETA CÁLIDA BONE/IVORY
    ════════════════════════════════════════ */
    :root {
      --ex-bg:       #1C160F;
      --ex-surf:     #241C13;
      --ex-surf2:    #2E2418;
      --ex-bord:     #3D3020;
      --ex-bord2:    #56422C;
      --ex-txt:      #EDE6D3;
      --ex-txt2:     #A8977E;
      --ex-txt3:     #6B5A43;
      --ex-amber:    #FFB300;
      --ex-coral:    #FF4D6D;
      --ex-acid:     #C6E800;
      --ex-cyan:     #00E5FF;
      --ex-rose:     #FF6EB4;
      --ex-garnet:   #9B1D3A;
      --nav-h:       58px;
      --top-h:       50px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Lexend', sans-serif;
      background: var(--ex-bg);
      color: var(--ex-txt);
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track  { background: var(--ex-surf); }
    ::-webkit-scrollbar-thumb  { background: var(--ex-bord2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--ex-amber); }

    /* NAV override */
    .nav {
      background: rgba(28,22,15,.97);
      backdrop-filter: blur(14px);
      border-bottom: 1.5px solid var(--ex-bord);
      height: var(--nav-h);
    }
    .nav__logo, .nav__link { color: var(--ex-txt); }
    .nav__link:hover       { background: rgba(255,179,0,.08); border-color: rgba(255,179,0,.4); color: var(--ex-amber); }
    .nav__link--active     { background: var(--ex-garnet) !important; color: var(--ex-txt) !important; border-color: var(--ex-garnet) !important; }
    .nav__toggle span      { background: var(--ex-txt); }

    /* ════════════════════════════════════════
       SHELL — página entera como flex column
    ════════════════════════════════════════ */
    .expl-page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding-top: var(--nav-h);
    }

    /* TOPBAR */
    .expl-topbar {
      flex: 0 0 var(--top-h);
      background: var(--ex-surf);
      border-bottom: 1.5px solid var(--ex-bord);
      display: flex;
      align-items: center;
      gap: .75rem;
      padding: 0 1rem;
      overflow: hidden;
      z-index: 20;
    }

    /* BODY = 3 columnas, ocupa TODO el espacio restante */
    .expl-body {
      flex: 1 1 0;
      min-height: 0;         /* ← sin esto los paneles no se recortan */
      display: flex;
      overflow: hidden;
    }

    /* ── Columna izquierda ── */
    .expl-filters {
      flex: 0 0 clamp(190px, 19vw, 255px);
      overflow-y: auto;
      background: var(--ex-surf);
      border-right: 1.5px solid var(--ex-bord);
      padding: 1.1rem .875rem;
    }

    /* ── Centro ── */
    .expl-center {
      flex: 1 1 0;
      min-width: 0;
      overflow-y: auto;
      background: var(--ex-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem 2rem;
      gap: .75rem;
    }

    /* ── Columna derecha ── */
    .expl-results {
      flex: 0 0 clamp(230px, 22vw, 295px);
      overflow-y: auto;
      background: var(--ex-surf);
      border-left: 1.5px solid var(--ex-bord);
      padding: 1rem .875rem;
      display: flex;
      flex-direction: column;
      gap: .625rem;
    }

    /* ════════════════════════════════════════
       TOPBAR CONTROLS
    ════════════════════════════════════════ */
    .view-toggle {
      display: flex;
      border: 1.5px solid var(--ex-bord2);
      border-radius: 4px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .view-toggle__btn {
      padding: .3rem .85rem;
      font-family: 'Montserrat', sans-serif;
      font-size: .7rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: .1em;
      color: var(--ex-txt3);
      background: transparent; border: none; cursor: pointer;
      transition: all .18s ease; white-space: nowrap;
      display: flex; align-items: center; gap: .35rem;
    }
    .view-toggle__btn.is-active { background: var(--ex-garnet); color: var(--ex-txt); }
    .view-toggle__btn:hover:not(.is-active) { background: rgba(255,255,255,.05); color: var(--ex-txt2); }

    #active-filters-bar {
      display: flex; flex-wrap: nowrap; align-items: center;
      gap: 5px; flex: 1; overflow-x: auto; min-width: 0;
    }
    #active-filters-bar::-webkit-scrollbar { height: 0; }

    .active-filter-hint {
      font-family: 'Montserrat', sans-serif;
      font-size: .65rem; color: var(--ex-txt3);
      text-transform: uppercase; letter-spacing: .1em; white-space: nowrap;
    }
    .active-filter-chip {
      display: inline-flex; align-items: center; gap: .3rem;
      padding: .2rem .55rem;
      background: rgba(255,179,0,.1); border: 1px solid rgba(255,179,0,.35);
      border-radius: 3px; color: var(--ex-amber);
      font-family: 'Montserrat', sans-serif;
      font-size: .63rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: background .15s ease;
    }
    .active-filter-chip:hover { background: rgba(255,179,0,.2); }
    .active-filter-chip--clear { background: rgba(255,77,109,.1); border-color: rgba(255,77,109,.3); color: var(--ex-coral); }

    .results-badge {
      font-family: 'Montserrat', sans-serif;
      font-size: .65rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .1em;
      color: var(--ex-txt3); white-space: nowrap; flex-shrink: 0;
    }
    .results-badge strong { color: var(--ex-acid); font-size: .82rem; }

    .topbar-search {
      display: flex; align-items: center; gap: .4rem;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--ex-bord); border-radius: 4px;
      padding: .28rem .65rem; flex-shrink: 0;
    }
    .topbar-search input {
      background: none; border: none; outline: none;
      color: var(--ex-txt); font-family: 'Lexend', sans-serif;
      font-size: .78rem; width: 140px;
    }
    .topbar-search input::placeholder { color: var(--ex-txt3); }

    /* ════════════════════════════════════════
       FILTROS
    ════════════════════════════════════════ */
    .filter-section { margin-bottom: 1.5rem; }
    .filter-section__title {
      font-family: 'Montserrat', sans-serif;
      font-size: .62rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: .18em;
      color: var(--ex-txt3);
      margin-bottom: .6rem; padding-bottom: .4rem;
      border-bottom: 1px solid var(--ex-bord);
    }
    .filter-option {
      display: flex; align-items: center; gap: .55rem;
      margin-bottom: .38rem; cursor: pointer; user-select: none;
    }
    .filter-option input[type="checkbox"] {
      appearance: none; -webkit-appearance: none;
      width: 14px; height: 14px;
      border: 1.5px solid var(--ex-bord2); border-radius: 3px;
      background: transparent; cursor: pointer; flex-shrink: 0;
      transition: all .15s ease; position: relative;
    }
    .filter-option input:checked {
      background: rgba(255,179,0,.15); border-color: var(--ex-amber);
      box-shadow: 0 0 5px rgba(255,179,0,.3);
    }
    .filter-option input:checked::after {
      content: '✓'; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%); font-size: 9px; color: var(--ex-amber); font-weight: 900;
    }
    .filter-option__label {
      font-size: .78rem; color: var(--ex-txt2);
      display: flex; align-items: center; gap: .35rem;
      transition: color .15s ease; flex: 1;
    }
    .filter-option:hover .filter-option__label { color: var(--ex-txt); }
    .filter-option input:checked + .filter-option__label { color: var(--ex-txt); }
    .filter-option__count {
      font-size: .6rem; color: var(--ex-txt3);
      font-family: 'Montserrat', sans-serif; font-weight: 700; margin-left: auto;
    }
    .filter-clear-btn {
      font-family: 'Montserrat', sans-serif;
      font-size: .62rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em;
      color: var(--ex-coral); background: none; border: none; cursor: pointer;
      padding: .15rem 0; margin-top: .25rem; opacity: .6; transition: opacity .15s;
    }
    .filter-clear-btn:hover { opacity: 1; }

    /* ════════════════════════════════════════
       VISTAS
    ════════════════════════════════════════ */
    .view-pane { display: none; width: 100%; flex-direction: column; align-items: center; gap: .75rem; }
    .view-pane.is-visible { display: flex; }

    .anatomy-hint {
      font-family: 'Montserrat', sans-serif;
      font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .15em;
      color: var(--ex-txt3); text-align: center;
    }

    /* SVG skeleton */
    .skeleton-svg-wrap { width: 100%; max-width: 290px; }
    .skeleton-svg-wrap svg { width: 100%; height: auto; overflow: visible; }

    .skel-region { cursor: pointer; transition: filter .2s ease; }
    .skel-region path, .skel-region ellipse,
    .skel-region rect,  .skel-region circle { transition: fill .2s, stroke .2s; }
    .skel-region:hover { filter: drop-shadow(0 0 8px rgba(255,179,0,.7)); }
    .skel-region:hover path, .skel-region:hover ellipse,
    .skel-region:hover rect,  .skel-region:hover circle {
      fill: rgba(255,179,0,.2) !important; stroke: var(--ex-amber) !important;
    }
    .region--active { animation: pulse-warm 2.5s ease-in-out infinite; }
    .region--active path, .region--active ellipse,
    .region--active rect,  .region--active circle {
      fill: rgba(255,179,0,.18) !important; stroke: var(--ex-amber) !important; stroke-width: 2 !important;
    }
    .region--dim { opacity: .2; transition: opacity .2s; }
    @keyframes pulse-warm {
      0%,100% { filter: drop-shadow(0 0 5px rgba(255,179,0,.5)); }
      50%      { filter: drop-shadow(0 0 13px rgba(255,179,0,1)); }
    }
    .region-label {
      font-family: 'Montserrat', sans-serif; font-size: 8.5px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em; fill: var(--ex-txt3); pointer-events: none;
    }

    /* Grid patologías */
    .patol-intro { text-align: center; margin-bottom: .75rem; }
    .patol-intro p {
      font-family: 'Montserrat', sans-serif; font-size: .68rem;
      text-transform: uppercase; letter-spacing: .12em; color: var(--ex-txt3);
    }
    #patology-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(125px, 1fr));
      gap: .625rem; width: 100%; max-width: 600px;
    }
    .patol-card {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: .4rem; padding: 1.2rem .75rem;
      background: var(--ex-surf2); border: 1.5px solid var(--ex-bord); border-radius: 4px;
      cursor: pointer; font-family: inherit; position: relative; overflow: hidden;
      transition: border-color .2s, box-shadow .2s, transform .15s;
    }
    .patol-card::before {
      content: ''; position: absolute; inset: 0;
      background: var(--patol-color); opacity: 0; transition: opacity .2s;
    }
    .patol-card:hover::before { opacity: .08; }
    .patol-card:hover {
      border-color: var(--patol-color); transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,.4), 0 0 0 1px var(--patol-color);
    }
    .patol-card.is-active { border-color: var(--patol-color); box-shadow: 0 0 0 2px var(--patol-color), 0 4px 18px rgba(0,0,0,.5); }
    .patol-card.is-active::before { opacity: .12; }
    .patol-card__icon { font-size: 1.75rem; line-height: 1; position: relative; }
    .patol-card__label {
      font-family: 'Montserrat', sans-serif; font-size: .67rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em; color: var(--ex-txt2);
      text-align: center; position: relative;
    }
    .patol-card.is-active .patol-card__label { color: var(--patol-color); }
    .patol-card__count {
      font-family: 'Montserrat', sans-serif; font-size: .6rem; font-weight: 700;
      color: var(--ex-txt3); position: relative;
    }
    .patol-card.is-active .patol-card__count { color: var(--patol-color); opacity: .7; }

    /* ════════════════════════════════════════
       RESULT CARDS
    ════════════════════════════════════════ */
    .results-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding-bottom: .625rem; border-bottom: 1.5px solid var(--ex-bord); flex-shrink: 0;
    }
    .results-panel-header h2 {
      font-family: 'Montserrat', sans-serif; font-size: .65rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: .18em; color: var(--ex-txt3);
    }
    #results-list { display: flex; flex-direction: column; gap: .625rem; }

    .result-card {
      background: var(--ex-surf2); border: 1.5px solid var(--ex-bord);
      border-radius: 4px; overflow: hidden;
      transition: border-color .2s, box-shadow .2s;
      animation: slideIn .3s ease both;
    }
    @keyframes slideIn { from { opacity:0; transform:translateX(10px); } to { opacity:1; transform:translateX(0); } }
    .result-card:hover {
      border-color: var(--ex-bord2);
      box-shadow: -3px 0 0 var(--accent, var(--ex-amber)), 0 2px 10px rgba(0,0,0,.3);
    }
    .result-card__accent-bar { height: 3px; background: var(--accent, var(--ex-amber)); }
    .result-card__body { padding: .7rem .7rem .6rem; }
    .result-card__header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: .28rem;
    }
    .result-card__id {
      font-family: 'Montserrat', sans-serif; font-size: .58rem; font-weight: 900;
      text-transform: uppercase; letter-spacing: .14em; color: var(--accent, var(--ex-amber));
    }
    .result-card__epoch {
      font-family: 'Montserrat', sans-serif; font-size: .57rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em; color: var(--ex-txt3);
    }
    .result-card__title {
      font-family: 'Lexend', sans-serif; font-size: .83rem; font-weight: 700;
      color: var(--ex-txt); margin-bottom: .28rem; line-height: 1.3;
    }
    .result-card__desc {
      font-size: .73rem; color: var(--ex-txt2); line-height: 1.5; margin-bottom: .6rem;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .result-card__meta { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: .55rem; }
    .result-tag {
      font-family: 'Montserrat', sans-serif; font-size: .57rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .05em; padding: .14rem .38rem;
      border-radius: 2px; border: 1px solid;
    }
    .result-tag--region { background: rgba(212,201,168,.07); border-color: rgba(212,201,168,.18); color: var(--ex-txt2); }
    .result-tag--patol  {
      background: color-mix(in srgb, var(--tag-color) 12%, transparent);
      border-color: color-mix(in srgb, var(--tag-color) 28%, transparent);
      color: var(--tag-color);
    }
    .result-tag--sexo   { background: rgba(255,110,180,.07); border-color: rgba(255,110,180,.2); color: var(--ex-rose); }
    .result-tag[data-clickable] { cursor: pointer; }
    .result-tag[data-clickable]:hover { opacity: .75; }
    .result-card__link {
      display: inline-flex; align-items: center; gap: .25rem;
      font-family: 'Montserrat', sans-serif; font-size: .62rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .1em; color: var(--accent, var(--ex-amber));
      transition: gap .15s ease;
    }
    .result-card__link:hover { gap: .45rem; }

    .results-empty {
      display: flex; flex-direction: column; align-items: center; gap: .75rem;
      padding: 2.5rem 1rem; text-align: center;
    }
    .results-empty__icon { font-size: 1.9rem; opacity: .3; }
    .results-empty p { font-size: .78rem; color: var(--ex-txt3); }
    .btn-clear-all {
      font-family: 'Montserrat', sans-serif; font-size: .68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em; padding: .33rem .85rem;
      background: rgba(255,77,109,.1); border: 1px solid rgba(255,77,109,.3);
      border-radius: 3px; color: var(--ex-coral); cursor: pointer; transition: background .15s;
    }
    .btn-clear-all:hover { background: rgba(255,77,109,.2); }

    /* ════════════════════════════════════════
       TOOLTIP
    ════════════════════════════════════════ */
    .svg-tooltip {
      position: fixed; background: rgba(28,22,15,.97);
      border: 1px solid rgba(255,179,0,.5); color: var(--ex-amber);
      font-family: 'Montserrat', sans-serif; font-size: .68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .1em;
      padding: .28rem .65rem; border-radius: 3px;
      pointer-events: none; z-index: 999; opacity: 0;
      transition: opacity .12s; white-space: nowrap;
    }

    /* ════════════════════════════════════════
       MOBILE ≤ 1024px
    ════════════════════════════════════════ */
    .mob-fab-bar {
      display: none; position: fixed; bottom: 1.2rem; left: 50%;
      transform: translateX(-50%); z-index: 50; gap: .75rem;
    }
    .mob-fab {
      display: flex; align-items: center; gap: .4rem;
      padding: .55rem 1rem; background: rgba(28,22,15,.95);
      border: 1.5px solid rgba(255,179,0,.4); border-radius: 30px;
      color: var(--ex-amber); font-family: 'Montserrat', sans-serif;
      font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em;
      cursor: pointer; backdrop-filter: blur(12px);
      box-shadow: 0 4px 18px rgba(0,0,0,.6), 0 0 8px rgba(255,179,0,.1);
      transition: all .2s; white-space: nowrap;
    }
    .mob-fab--results { border-color: rgba(198,232,0,.4); color: var(--ex-acid); }

    .panel-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.65); backdrop-filter: blur(3px);
      z-index: 40; opacity: 0; pointer-events: none; transition: opacity .3s;
    }
    .panel-overlay.is-visible { opacity: 1; pointer-events: all; }

    .panel-close {
      position: absolute; top: .75rem; right: .75rem;
      background: rgba(255,255,255,.06); border: 1px solid var(--ex-bord2);
      border-radius: 50%; width: 30px; height: 30px;
      display: grid; place-items: center; color: var(--ex-txt2);
      font-size: 1rem; cursor: pointer; transition: all .15s; z-index: 2;
    }
    .panel-close:hover { background: rgba(255,77,109,.15); border-color: var(--ex-coral); color: var(--ex-coral); }

    @media (max-width: 1024px) {
      html, body { overflow: auto; }

      .expl-body { overflow: visible; flex-direction: column; }

      .expl-filters,
      .expl-results {
        position: fixed; top: 0; bottom: 0;
        width: min(82vw, 300px); height: 100dvh;
        z-index: 45; overflow-y: auto;
        padding-top: 3.5rem;
        transition: transform .32s cubic-bezier(.22,1,.36,1);
      }
      .expl-filters { flex: none; left: 0;  transform: translateX(-105%); }
      .expl-results { flex: none; right: 0; left: auto; transform: translateX(105%); }
      .expl-filters.is-open { transform: translateX(0); }
      .expl-results.is-open { transform: translateX(0); }

      .expl-center {
        flex: none; min-width: 0; width: 100%;
        height: calc(100dvh - var(--nav-h) - var(--top-h));
        overflow-y: auto; padding-bottom: 5rem;
      }

      .panel-overlay { display: block; }
      .mob-fab-bar   { display: flex; }
      .topbar-search { display: none; }
    }

    @media (max-width: 600px) {
      .view-toggle__btn { padding: .28rem .5rem; font-size: .62rem; }
      #patology-grid { grid-template-columns: repeat(2,1fr); }
      .skeleton-svg-wrap { max-width: 240px; }
    }
  </style>
</head>
<body>

  <header class="nav" role="banner">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo" aria-label="Inicio">
        <div class="nav__logo-icon" aria-hidden="true">𝕆</div>
        OsteoVirtual
      </a>
      <button class="nav__toggle" id="navToggle" aria-label="Abrir menú" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav id="navLinks" class="nav__links">
        <a href="exploracion.html" class="nav__link nav__link--active">Exploración</a>
        <a href="coleccion.html"   class="nav__link">Colección</a>
        <a href="ficha-maestra.html" class="nav__link">Fichas</a>
      </nav>
    </div>
  </header>

  <div class="expl-page">

    <!-- TOPBAR -->
    <div class="expl-topbar" role="toolbar" aria-label="Controles del visualizador">
      <div class="view-toggle" role="group" aria-label="Cambiar vista">
        <button class="view-toggle__btn" data-view-btn="anatomia">🦴 Anatómica</button>
        <button class="view-toggle__btn" data-view-btn="patologia">🔬 Patológica</button>
      </div>
      <div id="active-filters-bar" aria-live="polite"></div>

  <script>
    /* Nav */
    const navToggle = document.getElementById('navToggle');
    const navLinks  = document.getElementById('navLinks');
    navToggle?.addEventListener('click', () => {
      const open = navLinks.classList.toggle('is-open');
      navToggle.setAttribute('aria-expanded', open);
      const sp = navToggle.querySelectorAll('span');
      if (open) {
        sp[0].style.cssText = 'transform:translateY(7.5px) rotate(45deg)';
        sp[1].style.cssText = 'opacity:0;transform:scaleX(0)';
        sp[2].style.cssText = 'transform:translateY(-7.5px) rotate(-45deg)';
      } else { sp.forEach(s => s.style.cssText = ''); }
    });

    /* Drawers */
    const fPanel = document.getElementById('filters-panel');
    const rPanel = document.getElementById('results-panel');
    const overlay = document.getElementById('panel-overlay');
    function openDrawer(p) {
      p.classList.add('is-open');
      overlay.classList.add('is-visible');
      document.body.style.overflow = 'hidden';
      document.getElementById('mob-search-wrap').style.display = p === fPanel ? 'block' : 'none';
    }
    function closeDrawers() {
      fPanel.classList.remove('is-open');
      rPanel.classList.remove('is-open');
      overlay.classList.remove('is-visible');
      document.body.style.overflow = '';
    }
    document.getElementById('mob-btn-filters')?.addEventListener('click', () => openDrawer(fPanel));
    document.getElementById('mob-btn-results')?.addEventListener('click', () => openDrawer(rPanel));
    overlay.addEventListener('click', closeDrawers);
    document.querySelectorAll('[data-close-panel]').forEach(b => b.addEventListener('click', closeDrawers));

    /* Sync search inputs */
    const sTop = document.getElementById('search-input');
    const sMob = document.getElementById('search-input-mob');
    sTop?.addEventListener('input', () => { if (sMob) sMob.value = sTop.value; });
    sMob?.addEventListener('input', () => {
      if (sTop) sTop.value = sMob.value;
      state.filters.query = sMob.value.toLowerCase().trim();
      renderResults(); updateActiveFiltersBar();
    });

    /* Sync side count */
    new MutationObserver(() => {
      const s = document.getElementById('results-count-side');
      const t = document.getElementById('results-count');
      if (s && t) s.textContent = t.textContent;
    }).observe(document.getElementById('results-count'), { childList:true, subtree:true, characterData:true });

    /* Keyboard SVG */
    document.querySelectorAll('[data-region]').forEach(el => {
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); el.click(); }
      });
    });

    /* Clear per category */
    function clearFilterCat(cat) {
      state.filters[cat] = null;
      syncFilterUI();
      if (cat === 'region') highlightSkeletonRegion(null);
      renderResults(); updateActiveFiltersBar();
      if (state.view === 'patologia') renderPatologyGrid();
    }

    /* GSAP */
    if (typeof gsap !== 'undefined') {
      gsap.from('.expl-topbar',  { y:-14, opacity:0, duration:.4, ease:'power3.out' });
      gsap.from('.expl-filters', { x:-18, opacity:0, duration:.45, ease:'power3.out', delay:.08 });
      gsap.from('.expl-center',  { opacity:0, duration:.45, ease:'power2.out', delay:.1 });
      gsap.from('.expl-results', { x:18,  opacity:0, duration:.45, ease:'power3.out', delay:.08 });
    }
  </script>
