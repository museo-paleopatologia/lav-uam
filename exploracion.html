<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Exploración interactiva de paleopatología — Esqueleto anatómico y grid de patologías con filtros combinados." />
  <title>Exploración · OsteoVirtual</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700;900&family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet" />

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>

  <!-- Global styles -->
  <link rel="stylesheet" href="style.css" />

  <style>
    /* ══════════════════════════════════════════════
       PAGE-LEVEL OVERRIDES — DARK THEME
    ══════════════════════════════════════════════ */
    body {
      background: #0d0a07;
      color: #EDE6D3;
      overflow-x: hidden;
    }

    /* Scrollbar dark */
    ::-webkit-scrollbar-track { background: #1a1410; }
    ::-webkit-scrollbar-thumb { background: #3a3028; }
    ::-webkit-scrollbar-thumb:hover { background: #00E5FF; }

    /* NAV on dark */
    .nav {
      background: rgba(13, 10, 7, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom-color: rgba(0, 229, 255, 0.2);
    }

    .nav__logo, .nav__link { color: #EDE6D3; }
    .nav__link:hover { background: rgba(0, 229, 255, 0.08); border-color: rgba(0,229,255,0.4); }
    .nav__toggle span { background: #EDE6D3; }

    /* ══════════════════════════════════════════════
       EXPLORATION LAYOUT
    ══════════════════════════════════════════════ */
    .expl-wrapper {
      display: grid;
      grid-template-columns: 260px 1fr 300px;
      grid-template-rows: auto 1fr;
      min-height: 100svh;
      padding-top: 60px;
    }

    /* Topbar across all 3 columns */
    .expl-topbar {
      grid-column: 1 / -1;
      background: rgba(26, 20, 16, 0.9);
      border-bottom: 1px solid rgba(0,229,255,0.15);
      padding: 0.75rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      backdrop-filter: blur(8px);
      position: sticky;
      top: 60px;
      z-index: 10;
    }

    /* View toggle */
    .view-toggle {
      display: flex;
      border: 1.5px solid rgba(0,229,255,0.25);
      border-radius: 4px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .view-toggle__btn {
      padding: 0.35rem 0.9rem;
      font-family: var(--font-accent);
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #8a7a66;
      background: transparent;
      border: none;
      transition: all 0.18s ease;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      white-space: nowrap;
    }

    .view-toggle__btn.is-active {
      background: rgba(0, 229, 255, 0.12);
      color: #00E5FF;
      box-shadow: inset 0 0 0 1px rgba(0,229,255,0.3);
    }

    .view-toggle__btn:hover:not(.is-active) { background: rgba(255,255,255,0.04); color: #EDE6D3; }

    /* Active filters bar */
    #active-filters-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      flex: 1;
    }

    .active-filter-hint {
      font-family: var(--font-accent);
      font-size: 0.68rem;
      color: #5a4a38;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .active-filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.22rem 0.6rem;
      background: rgba(0,229,255,0.1);
      border: 1px solid rgba(0,229,255,0.35);
      border-radius: 3px;
      color: #00E5FF;
      font-family: var(--font-accent);
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .active-filter-chip:hover { background: rgba(0,229,255,0.2); }
    .active-filter-chip--clear { background: rgba(255,77,109,0.1); border-color: rgba(255,77,109,0.35); color: #FF4D6D; }
    .chip-x { opacity: 0.7; font-size: 0.85rem; }

    /* Search in topbar */
    .topbar-search {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      padding: 0.3rem 0.75rem;
      margin-left: auto;
      flex-shrink: 0;
    }

    .topbar-search input {
      background: none;
      border: none;
      outline: none;
      color: #EDE6D3;
      font-family: var(--font-ui);
      font-size: 0.82rem;
      width: 160px;
    }

    .topbar-search input::placeholder { color: #5a4a38; }

    .topbar-search svg { color: #5a4a38; flex-shrink: 0; }

    /* Results counter in topbar */
    .results-badge {
      font-family: var(--font-accent);
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #5a4a38;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .results-badge strong {
      color: #C6E800;
      font-size: 0.85rem;
    }

    /* ══════════════════════════════════════════════
       LEFT PANEL — FILTERS
    ══════════════════════════════════════════════ */
    #filters-panel {
      background: #110e0b;
      border-right: 1px solid rgba(255,255,255,0.06);
      padding: 1.5rem 1rem;
      overflow-y: auto;
      height: calc(100svh - 60px - 52px);
      position: sticky;
      top: calc(60px + 52px);
    }

    .filter-section {
      margin-bottom: 2rem;
    }

    .filter-section__title {
      font-family: var(--font-accent);
      font-size: 0.65rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #5a4a38;
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    /* Checkbox estilizado */
    .filter-option {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.45rem;
      cursor: pointer;
    }

    .filter-option input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 3px;
      background: transparent;
      cursor: pointer;
      transition: all 0.15s ease;
      flex-shrink: 0;
      position: relative;
    }

    .filter-option input[type="checkbox"]:checked {
      background: rgba(0,229,255,0.15);
      border-color: #00E5FF;
      box-shadow: 0 0 6px rgba(0,229,255,0.3);
    }

    .filter-option input[type="checkbox"]:checked::after {
      content: '✓';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 10px;
      color: #00E5FF;
      font-weight: 900;
    }

    .filter-option__label {
      font-size: 0.82rem;
      color: #a08870;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: color 0.15s ease;
    }

    .filter-option:hover .filter-option__label { color: #EDE6D3; }
    .filter-option input:checked + .filter-option__label { color: #EDE6D3; }

    .filter-option__count {
      margin-left: auto;
      font-size: 0.65rem;
      color: #3a3028;
      font-family: var(--font-accent);
      font-weight: 700;
    }

    .filter-option input:checked ~ .filter-option__count { color: rgba(0,229,255,0.5); }

    /* Clear section button */
    .filter-clear-btn {
      font-family: var(--font-accent);
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #FF4D6D;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      margin-top: 0.5rem;
      opacity: 0.7;
      transition: opacity 0.15s ease;
    }
    .filter-clear-btn:hover { opacity: 1; }

    /* ══════════════════════════════════════════════
       CENTER — CONTENEDOR DINÁMICO
    ══════════════════════════════════════════════ */
    .expl-center {
      background: #0d0a07;
      overflow-y: auto;
      height: calc(100svh - 60px - 52px);
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* Vista switch container */
    .view-pane {
      display: none;
      flex: 1;
    }
    .view-pane.is-visible { display: flex; flex-direction: column; }

    /* ─── Vista A: Esqueleto ─── */
    #view-anatomy {
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      gap: 1rem;
    }

    .anatomy-hint {
      font-family: var(--font-accent);
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #3a3028;
      text-align: center;
    }

    /* SVG skeleton wrapper */
    .skeleton-svg-wrap {
      position: relative;
      width: 100%;
      max-width: 340px;
      margin: 0 auto;
    }

    .skeleton-svg-wrap svg {
      width: 100%;
      height: auto;
      overflow: visible;
    }

    /* Region groups */
    .skel-region {
      transition: all 0.2s ease;
    }

    .skel-region path,
    .skel-region ellipse,
    .skel-region rect,
    .skel-region circle,
    .skel-region polygon {
      transition: fill 0.2s ease, filter 0.2s ease;
    }

    /* Default fill */
    .skel-region { fill: #D4C9A8; stroke: #2A1F0E; stroke-width: 1.5; }

    /* Hover */
    .skel-region:hover { filter: drop-shadow(0 0 8px rgba(0,229,255,0.6)); cursor: pointer; }
    .skel-region:hover path,
    .skel-region:hover ellipse,
    .skel-region:hover rect,
    .skel-region:hover circle { fill: rgba(0,229,255,0.25); stroke: #00E5FF; }

    /* Active */
    .region--active { filter: drop-shadow(0 0 12px rgba(0,229,255,0.8)); }
    .region--active path,
    .region--active ellipse,
    .region--active rect,
    .region--active circle { fill: rgba(0,229,255,0.2) !important; stroke: #00E5FF !important; stroke-width: 2 !important; }

    /* Dimmed */
    .region--dim { opacity: 0.25; }

    /* Region labels */
    .region-label {
      font-family: var(--font-accent);
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      fill: #5a4a38;
      pointer-events: none;
      transition: fill 0.2s ease;
    }

    .region--active ~ .region-label,
    .skel-region:hover ~ .region-label { fill: #00E5FF; }

    /* ─── Vista B: Grid Patologías ─── */
    #view-pathology {
      padding: 2rem 1.5rem;
      align-items: stretch;
    }

    .patol-intro {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .patol-intro p {
      font-size: 0.82rem;
      color: #5a4a38;
      font-family: var(--font-accent);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    #patology-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.75rem;
      width: 100%;
    }

    .patol-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 1.5rem 1rem;
      background: rgba(255,255,255,0.02);
      border: 1.5px solid rgba(255,255,255,0.07);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
      font-family: inherit;
    }

    .patol-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--patol-color);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .patol-card:hover::before { opacity: 0.07; }
    .patol-card:hover { border-color: var(--patol-color); box-shadow: 0 0 16px rgba(0,0,0,0.4), inset 0 0 0 1px var(--patol-color); transform: translateY(-2px); }

    .patol-card.is-active {
      border-color: var(--patol-color);
      box-shadow: 0 0 20px rgba(0,0,0,0.5), 0 0 8px var(--patol-color);
    }
    .patol-card.is-active::before { opacity: 0.12; }

    .patol-card__icon {
      font-size: 2rem;
      line-height: 1;
      display: block;
      position: relative;
    }

    .patol-card__label {
      font-family: var(--font-accent);
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #a08870;
      text-align: center;
      position: relative;
    }

    .patol-card.is-active .patol-card__label { color: var(--patol-color); }

    .patol-card__count {
      font-family: var(--font-accent);
      font-size: 0.62rem;
      font-weight: 700;
      color: #3a3028;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      position: relative;
    }

    .patol-card.is-active .patol-card__count { color: var(--patol-color); opacity: 0.7; }

    /* ══════════════════════════════════════════════
       RIGHT PANEL — RESULTS
    ══════════════════════════════════════════════ */
    #results-panel {
      background: #0f0c09;
      border-left: 1px solid rgba(255,255,255,0.06);
      overflow-y: auto;
      height: calc(100svh - 60px - 52px);
      position: sticky;
      top: calc(60px + 52px);
      padding: 1.25rem 0.875rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    #results-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      flex: 1;
    }

    /* ─── Result Card ─── */
    .result-card {
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 4px;
      overflow: hidden;
      transition: all 0.2s ease;
      animation: slideInCard 0.35s var(--ease-out) both;
      position: relative;
    }

    @keyframes slideInCard {
      from { opacity: 0; transform: translateX(16px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .result-card:hover {
      background: rgba(255,255,255,0.045);
      border-color: rgba(var(--accent-rgb), 0.3);
      box-shadow: 0 0 0 1px var(--accent), -3px 0 0 0 var(--accent);
    }

    .result-card__accent-bar {
      height: 3px;
      background: var(--accent);
      opacity: 0.7;
    }

    .result-card__body {
      padding: 0.875rem 0.875rem 0.75rem;
    }

    .result-card__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.4rem;
    }

    .result-card__id {
      font-family: var(--font-accent);
      font-size: 0.62rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--accent);
    }

    .result-card__epoch {
      font-family: var(--font-accent);
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #3a3028;
    }

    .result-card__title {
      font-family: var(--font-ui);
      font-size: 0.9rem;
      font-weight: 700;
      color: #EDE6D3;
      margin-bottom: 0.4rem;
      line-height: 1.3;
    }

    .result-card__desc {
      font-size: 0.78rem;
      color: #7a6a55;
      line-height: 1.5;
      margin-bottom: 0.75rem;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .result-card__meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 0.75rem;
    }

    .result-tag {
      font-family: var(--font-accent);
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.18rem 0.45rem;
      border-radius: 2px;
      border: 1px solid;
    }

    .result-tag--region {
      background: rgba(212, 201, 168, 0.08);
      border-color: rgba(212, 201, 168, 0.2);
      color: #a08870;
    }

    .result-tag[data-clickable] { cursor: pointer; transition: all 0.15s ease; }
    .result-tag[data-clickable]:hover { opacity: 1; transform: scale(1.05); }

    .result-tag--patol {
      background: color-mix(in srgb, var(--tag-color) 12%, transparent);
      border-color: color-mix(in srgb, var(--tag-color) 35%, transparent);
      color: var(--tag-color);
    }

    .result-tag--sexo {
      background: rgba(255, 110, 180, 0.08);
      border-color: rgba(255, 110, 180, 0.2);
      color: #FF6EB4;
    }

    .result-card__link {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-family: var(--font-accent);
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      transition: gap 0.15s ease;
    }

    .result-card__link:hover { gap: 0.5rem; }

    /* ─── Empty state ─── */
    .results-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 3rem 1rem;
      text-align: center;
    }

    .results-empty__icon { font-size: 2.5rem; opacity: 0.4; }

    .results-empty p {
      font-size: 0.82rem;
      color: #5a4a38;
    }

    .btn-clear-all {
      font-family: var(--font-accent);
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.4rem 1rem;
      background: rgba(255,77,109,0.1);
      border: 1px solid rgba(255,77,109,0.35);
      border-radius: 3px;
      color: #FF4D6D;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .btn-clear-all:hover { background: rgba(255,77,109,0.2); }

    /* ══════════════════════════════════════════════
       SVG TOOLTIP
    ══════════════════════════════════════════════ */
    .svg-tooltip {
      position: fixed;
      background: rgba(13,10,7,0.95);
      border: 1px solid rgba(0,229,255,0.4);
      color: #00E5FF;
      font-family: var(--font-accent);
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.3rem 0.7rem;
      border-radius: 3px;
      pointer-events: none;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.15s ease;
      white-space: nowrap;
      box-shadow: 0 0 12px rgba(0,229,255,0.2);
    }

    /* ══════════════════════════════════════════════
       MOBILE — Float buttons + drawer
    ══════════════════════════════════════════════ */
    .mob-fab-bar {
      display: none;
      position: fixed;
      bottom: 1.25rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      gap: 0.75rem;
    }

    .mob-fab {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1.1rem;
      background: rgba(13,10,7,0.92);
      border: 1.5px solid rgba(0,229,255,0.35);
      border-radius: 30px;
      color: #00E5FF;
      font-family: var(--font-accent);
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.6), 0 0 12px rgba(0,229,255,0.15);
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    .mob-fab:hover { background: rgba(0,229,255,0.12); }
    .mob-fab--results { border-color: rgba(198,232,0,0.35); color: #C6E800; box-shadow: 0 4px 24px rgba(0,0,0,0.6), 0 0 12px rgba(198,232,0,0.15); }

    .panel-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 40;
    }

    .panel-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 50%;
      width: 32px; height: 32px;
      display: grid;
      place-items: center;
      color: #EDE6D3;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.15s ease;
      z-index: 2;
    }
    .panel-close:hover { background: rgba(255,77,109,0.2); border-color: #FF4D6D; color: #FF4D6D; }

    /* ══════════════════════════════════════════════
       RESPONSIVE — 1024px
    ══════════════════════════════════════════════ */
    @media (max-width: 1024px) {
      .expl-wrapper {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
      }

      .expl-topbar { top: 60px; }

      #filters-panel,
      #results-panel {
        position: fixed;
        top: 0; bottom: 0;
        width: min(85vw, 320px);
        height: 100svh;
        z-index: 45;
        transform: translateX(-110%);
        transition: transform 0.32s var(--ease-out);
        overflow-y: auto;
      }

    <button class="mob-fab mob-fab--results" id="mob-btn-results" aria-label="Ver resultados">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Resultados
    </button>
  </div>

  <!-- Panel overlay -->
  <div class="panel-overlay" id="panel-overlay" aria-hidden="true"></div>


  <!-- ═══════════════════════════════════════════
       SCRIPTS
  ═══════════════════════════════════════════ -->
  <script src="js/data.js"></script>
  <script src="js/visualizador.js"></script>
  <script>
    /* ── NAV toggle (mismo de index) ── */
    const toggle = document.getElementById('navToggle');
    const links  = document.getElementById('navLinks');
    if (toggle && links) {
      toggle.addEventListener('click', () => {
        const isOpen = links.classList.toggle('is-open');
        toggle.setAttribute('aria-expanded', isOpen);
        const spans = toggle.querySelectorAll('span');
        if (isOpen) {
          spans[0].style.cssText = 'transform:translateY(7.5px) rotate(45deg)';
          spans[1].style.cssText = 'opacity:0;transform:scaleX(0)';
          spans[2].style.cssText = 'transform:translateY(-7.5px) rotate(-45deg)';
        } else { spans.forEach(s => s.style.cssText = ''); }
      });
    }

    /* ── Sync topbar search & panel search ── */
    const searchMob = document.getElementById('search-input-mob');
    const searchTop = document.getElementById('search-input');
    if (searchMob && searchTop) {
      searchMob.addEventListener('input', () => {
        searchTop.value = searchMob.value;
        state.filters.query = searchMob.value.toLowerCase().trim();
        renderResults();
        updateActiveFiltersBar();
      });
      searchTop.addEventListener('input', () => {
        searchMob.value = searchTop.value;
      });
    }

    /* ── Panel overlay click (redundant safety) ── */
    document.getElementById('panel-overlay')?.addEventListener('click', () => {
      document.getElementById('filters-panel').classList.remove('is-open');
      document.getElementById('results-panel').classList.remove('is-open');
      document.body.style.overflow = '';
    });

    /* ── Sync results-count-panel ── */
    const observer = new MutationObserver(() => {
      const pc = document.getElementById('results-count-panel');
      const tc = document.getElementById('results-count');
      if (pc && tc) pc.textContent = tc.textContent;
    });
    const tc = document.getElementById('results-count');
    if (tc) observer.observe(tc, { childList: true, characterData: true, subtree: true });

    /* ── Utility for filter-clear buttons ── */
    function clearFilterCat(cat) {
      state.filters[cat] = null;
      syncFilterUI();
      if (cat === 'region') highlightSkeletonRegion(null);
      renderResults();
      updateActiveFiltersBar();
      if (state.view === 'patologia') renderPatologyGrid();
    }

    /* ── Keyboard on SVG regions ── */
    document.querySelectorAll('[data-region]').forEach(el => {
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          el.dispatchEvent(new MouseEvent('click', { bubbles: true }));
        }
      });
    });

    /* ── GSAP entrance on page load ── */
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof gsap !== 'undefined') {
        gsap.from('.expl-topbar', { y: -20, opacity: 0, duration: 0.5, ease: 'power3.out' });
        gsap.from('#filters-panel', { x: -30, opacity: 0, duration: 0.6, ease: 'power3.out', delay: 0.1 });
        gsap.from('.expl-center', { opacity: 0, duration: 0.7, ease: 'power2.out', delay: 0.15 });
        gsap.from('#results-panel', { x: 30, opacity: 0, duration: 0.6, ease: 'power3.out', delay: 0.1 });
      }
    });
  </script>

</body>
</html>
